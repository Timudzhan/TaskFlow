name: CI Tests

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Node deps
        run: |
          if [ -f package.json ]; then npm ci; else echo "no package.json"; fi

      - name: Run Node tests (if any)
        run: |
          if npm run -s test --version >/dev/null 2>&1; then npm test || true; else echo "no npm test script"; fi

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Run Python tests
        id: python-tests
        shell: bash
        run: |
          pytest -q && echo "pytest_status=success" >> $GITHUB_OUTPUT || echo "pytest_status=failure" >> $GITHUB_OUTPUT

      - name: Report result (comment on PR or set commit status)
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const status = "${{ steps.python-tests.outputs.pytest_status }}";
            const message = status === 'success' ? '✅ Ваши тесты прошли успешно.' : '❌ Тесты не прошли.';
            if (github.context.payload.pull_request) {
              const issue_number = github.context.payload.pull_request.number;
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number,
                body: message
              });
            } else {
              await github.rest.repos.createCommitStatus({
                owner: context.repo.owner,
                repo: context.repo.repo,
                sha: context.sha,
                state: status === 'success' ? 'success' : 'failure',
                description: message,
                context: 'CI/pytest'
              });
            }
